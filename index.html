<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 3 STS — Deep Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=IBM+Plex+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07111e;--s1:#0d1a2d;--s2:#101e35;--b:#182d45;--b2:#1f3855;--c1:#f0c040;--c2:#3b82f6;--c3:#22d3ee;--c4:#a78bfa;--c5:#f87171;--c6:#4ade80;--t:#d8e8f8;--td:#6b8cb0;--tb:#f0f8ff;--ff:'Outfit',sans-serif;--fm:'IBM Plex Mono',monospace;--fd:'Playfair Display',serif}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t);font-family:var(--ff);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 15% 30%,rgba(59,130,246,.07),transparent 70%),radial-gradient(ellipse 50% 60% at 85% 80%,rgba(240,192,64,.05),transparent 70%);pointer-events:none;z-index:0}
header{position:sticky;top:0;z-index:999;background:rgba(7,17,30,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--b)}
.hdr{max-width:1500px;margin:0 auto;padding:.55rem 1.2rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
.logo{font-family:var(--fd);font-size:1rem;color:var(--c1);white-space:nowrap;flex-shrink:0}
.logo small{color:var(--td);font-size:.7rem;font-family:var(--fm);display:block}
nav{display:flex;flex-wrap:wrap;gap:.2rem;flex:1}
.nb{padding:.28rem .65rem;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--td);font-family:var(--fm);font-size:.6rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.nb:hover{color:var(--t);border-color:var(--b2);background:var(--s2)}.nb.on{color:var(--c1);border-color:var(--c1);background:rgba(240,192,64,.1)}
.panel{display:none;padding:1.5rem;max-width:1500px;margin:0 auto;position:relative;z-index:1;animation:fi .25s ease}
.panel.on{display:block}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.hero{background:var(--s1);border:1px solid var(--b);border-radius:18px;padding:2.2rem 1.8rem;text-align:center;margin-bottom:1.8rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(240,192,64,.05),transparent 70%)}
.hero h1{font-family:var(--fd);font-size:clamp(1.4rem,4vw,2.6rem);background:linear-gradient(135deg,var(--c1),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;margin-bottom:.4rem}
.hero p{color:var(--td);font-size:.85rem;position:relative}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.8rem;margin-bottom:1.8rem}
.lcard{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:1.2rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.lcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cc,var(--c1))}
.lcard:hover{transform:translateY(-3px);box-shadow:0 10px 35px rgba(0,0,0,.4);border-color:var(--cc,var(--c1))}
.lcard h3{font-family:var(--fm);font-size:.62rem;color:var(--cc,var(--c1));text-transform:uppercase;letter-spacing:.1em;margin-bottom:.22rem}
.lcard h2{font-size:.88rem;font-weight:600;margin-bottom:.3rem}.lcard p{font-size:.73rem;color:var(--td);line-height:1.45}
.stitle{font-family:var(--fd);font-size:1.3rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--b),transparent);min-width:20px}
.badge{display:inline-flex;padding:.16rem .6rem;border-radius:20px;font-size:.6rem;font-family:var(--fm);font-weight:700;background:rgba(240,192,64,.12);color:var(--c1);border:1px solid rgba(240,192,64,.3)}
.stnav{display:flex;gap:.22rem;flex-wrap:wrap;margin-bottom:1.2rem;border-bottom:1px solid var(--b);padding-bottom:.65rem}
.stb{padding:.28rem .75rem;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--td);font-family:var(--fm);font-size:.6rem;cursor:pointer;transition:all .15s}
.stb:hover{color:var(--t);background:var(--s2)}.stb.on{color:var(--c1);border-color:var(--c1);background:rgba(240,192,64,.08)}
.stc{display:none}.stc.on{display:block}
.cb{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:1.2rem;margin-bottom:.9rem}
.cb h3{font-family:var(--fd);font-size:.98rem;color:var(--c3);margin-bottom:.75rem}
.cb h4{font-size:.78rem;font-weight:700;color:var(--c1);margin:.8rem 0 .3rem;font-family:var(--fm);text-transform:uppercase;letter-spacing:.07em}
.cb p{line-height:1.8;color:var(--t);font-size:.84rem;margin-bottom:.55rem}
.cb ul,.cb ol{padding-left:1.15rem;margin-bottom:.55rem}.cb li{font-size:.83rem;line-height:1.72;color:var(--t);margin-bottom:.22rem}
.cb li strong,.cb strong{color:var(--tb)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.7rem}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;margin-bottom:.7rem}
@media(max-width:700px){.two,.three{grid-template-columns:1fr}}
.hbox{border-left:3px solid var(--c6);background:rgba(74,222,128,.06);padding:.75rem 1rem;border-radius:0 8px 8px 0;font-size:.82rem;line-height:1.7;margin:.45rem 0}
.wbox{border-left:3px solid var(--c1);background:rgba(240,192,64,.06);padding:.75rem 1rem;border-radius:0 8px 8px 0;font-size:.82rem;line-height:1.7;margin:.45rem 0}
.rbox{border-left:3px solid var(--c5);background:rgba(248,113,113,.06);padding:.75rem 1rem;border-radius:0 8px 8px 0;font-size:.82rem;line-height:1.7;margin:.45rem 0}
.bxbox{border-left:3px solid var(--c2);background:rgba(59,130,246,.06);padding:.75rem 1rem;border-radius:0 8px 8px 0;font-size:.82rem;line-height:1.7;margin:.45rem 0}
.pbox{border-left:3px solid var(--c4);background:rgba(167,139,250,.06);padding:.75rem 1rem;border-radius:0 8px 8px 0;font-size:.82rem;line-height:1.7;margin:.45rem 0}
.tags{display:flex;flex-wrap:wrap;gap:.28rem;margin:.45rem 0}
.tag{padding:.18rem .55rem;border-radius:20px;font-size:.68rem;font-family:var(--fm);background:var(--s2);border:1px solid var(--b2);color:var(--td)}
.ktable{width:100%;border-collapse:collapse;margin:.4rem 0}
.ktable th{background:var(--s2);padding:.45rem .7rem;font-family:var(--fm);font-size:.64rem;text-align:left;color:var(--c1);border-bottom:1px solid var(--b2);text-transform:uppercase;letter-spacing:.06em}
.ktable td{padding:.45rem .7rem;font-size:.79rem;border-bottom:1px solid var(--b);line-height:1.5;vertical-align:top}
.ktable tr:last-child td{border-bottom:none}.ktable td:first-child{color:var(--c3);font-weight:600;font-size:.76rem;width:160px}
.tl{position:relative;padding-left:1.9rem;margin:.4rem 0}
.tl-line{position:absolute;left:.65rem;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--c2),var(--c4),var(--c5))}
.tl-item{position:relative;margin-bottom:.8rem}
.tl-dot{position:absolute;left:-1.65rem;top:.28rem;width:8px;height:8px;border-radius:50%;background:var(--c2);border:2px solid var(--bg)}
.tl-yr{font-family:var(--fm);font-size:.68rem;color:var(--c1);font-weight:700}
.tl-ev{font-size:.8rem;color:var(--t);line-height:1.42}
.tl-sub{font-size:.72rem;color:var(--td);line-height:1.38;margin-top:.1rem}
/* FLOWCHART */
.fw{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:1.6rem;margin-bottom:1.3rem;overflow-x:auto}
.ft{font-family:var(--fd);font-size:.95rem;text-align:center;margin-bottom:1.2rem}
.fc{display:flex;flex-direction:column;align-items:center;min-width:480px}
.fn{background:var(--s2);border:2px solid var(--nc,var(--c1));border-radius:9px;padding:.55rem .85rem;text-align:center;font-size:.72rem;font-weight:600;color:var(--tb);min-width:130px;max-width:220px;transition:all .18s;cursor:default;line-height:1.38}
.fn:hover{transform:scale(1.04)}.fn.se{border-radius:50px;background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(34,211,238,.12))}
.fn small{display:block;font-weight:400;font-size:.65rem;color:var(--td);margin-top:.18rem}
.fa{color:var(--td);font-size:.95rem;padding:.1rem 0;text-align:center}
.fb{display:flex;gap:.9rem;justify-content:center;align-items:flex-start;flex-wrap:wrap;width:100%}
.fbr{display:flex;flex-direction:column;align-items:center}
/* FLASHCARDS */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:.8rem}
.fcard{height:182px;perspective:1000px;cursor:pointer}
.finner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.fcard.flip .finner{transform:rotateY(180deg)}
.ffront,.fback{position:absolute;inset:0;backface-visibility:hidden;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.95rem;text-align:center;border:1px solid var(--b)}
.ffront{background:var(--s1);border-top:3px solid var(--c4)}
.ffront .fql{font-size:.63rem;color:var(--c4);font-family:var(--fm);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.06em}
.ffront .ft2{font-size:.93rem;font-weight:700;font-family:var(--fd)}.ffront .fh{font-size:.6rem;color:var(--td);margin-top:.3rem}
.fback{background:linear-gradient(135deg,rgba(59,130,246,.13),rgba(34,211,238,.08));border-top:3px solid var(--c3);transform:rotateY(180deg)}
.fback .fd{font-size:.79rem;line-height:1.52;color:var(--t)}
.fctrls{display:flex;gap:.45rem;margin-bottom:1.1rem;flex-wrap:wrap;align-items:center}
.fcfb{padding:.28rem .8rem;border-radius:20px;border:1px solid var(--b);background:var(--s1);color:var(--td);font-size:.65rem;cursor:pointer;font-family:var(--fm);transition:all .15s}
.fcfb:hover{background:var(--s2);color:var(--t)}.fcfb.on{background:var(--c4);color:var(--bg);border-color:var(--c4)}
/* QUIZ */
.qhdr{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:1.1rem 1.3rem;margin-bottom:1.1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.8rem}
.qstat .qval{font-family:var(--fm);font-size:1.25rem;font-weight:700;color:var(--c1)}.qstat .qlbl{font-size:.6rem;color:var(--td);text-transform:uppercase;letter-spacing:.06em}
.qpbar{flex:1;min-width:170px}.qptrack{background:var(--s2);border-radius:20px;height:6px;overflow:hidden}
.qpfill{height:100%;background:linear-gradient(to right,var(--c2),var(--c4));border-radius:20px;transition:width .35s}
.qptxt{font-size:.63rem;color:var(--td);margin-top:.25rem;font-family:var(--fm)}
.qsec{background:var(--s1);border:1px solid var(--b2);border-radius:12px;padding:1rem;margin-bottom:.75rem}
.qsec.ac{border-color:var(--c6);background:rgba(74,222,128,.04)}.qsec.aw{border-color:var(--c5);background:rgba(248,113,113,.04)}
.qtype-row{display:flex;align-items:center;gap:.3rem;margin-bottom:.22rem}
.qtb{padding:.08rem .42rem;border-radius:4px;font-size:.57rem;font-weight:700;font-family:var(--fm)}
.qtb.MCQ{background:rgba(59,130,246,.2);color:var(--c2)}.qtb.TF{background:rgba(74,222,128,.2);color:var(--c6)}
.qtb.ID{background:rgba(34,211,238,.2);color:var(--c3)}.qtb.ENUM{background:rgba(167,139,250,.2);color:var(--c4)}
.qtb.ESSAY{background:rgba(248,113,113,.2);color:var(--c5)}
.qnum{font-family:var(--fm);font-size:.6rem;color:var(--td);margin-bottom:.22rem}
.qtopic{font-size:.62rem;color:var(--c1);font-family:var(--fm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem}
.qtext{font-size:.87rem;font-weight:500;margin-bottom:.8rem;line-height:1.6}
.qopts{display:grid;gap:.35rem}
.qopt{padding:.58rem .88rem;border-radius:7px;border:1px solid var(--b);background:var(--s2);color:var(--t);font-size:.8rem;cursor:pointer;text-align:left;transition:all .15s;font-family:var(--ff)}
.qopt:hover:not(:disabled){border-color:var(--c2);background:rgba(59,130,246,.07)}
.qopt.qc{border-color:var(--c6);background:rgba(74,222,128,.12);color:var(--c6);font-weight:600}
.qopt.qw{border-color:var(--c5);background:rgba(248,113,113,.12);color:var(--c5)}.qopt:disabled{cursor:not-allowed}
.qexp{margin-top:.6rem;padding:.65rem;border-radius:7px;background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);font-size:.76rem;color:var(--td);line-height:1.52;display:none}
.qidinput{width:100%;padding:.58rem .88rem;border-radius:7px;border:1px solid var(--b);background:var(--s2);color:var(--t);font-family:var(--ff);font-size:.84rem;margin-bottom:.4rem;outline:none;transition:border .15s}
.qidinput:focus{border-color:var(--c3)}.qidinput.qc{border-color:var(--c6);background:rgba(74,222,128,.08)}.qidinput.qw{border-color:var(--c5);background:rgba(248,113,113,.08)}
.enumlist{display:grid;gap:.3rem;margin-bottom:.4rem}
.enumitem{display:flex;align-items:flex-start;gap:.5rem;padding:.42rem .72rem;border-radius:7px;border:1px solid var(--b);background:var(--s2);cursor:pointer;font-size:.8rem;transition:all .15s;line-height:1.4}
.enumitem:hover{border-color:var(--c4)}.enumitem input{accent-color:var(--c4);width:13px;height:13px;cursor:pointer;flex-shrink:0;margin-top:.1rem}
.enumitem.qc{border-color:var(--c6);background:rgba(74,222,128,.1);color:var(--c6)}.enumitem.qw{border-color:var(--c5);background:rgba(248,113,113,.1);color:var(--c5)}
.essayta{width:100%;min-height:95px;padding:.65rem .88rem;border-radius:7px;border:1px solid var(--b);background:var(--s2);color:var(--t);font-family:var(--ff);font-size:.82rem;resize:vertical;outline:none;line-height:1.6;transition:border .15s;margin-bottom:.4rem}
.essayta:focus{border-color:var(--c5)}
.essayans{margin-top:.6rem;padding:.65rem;border-radius:7px;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);font-size:.76rem;color:var(--td);line-height:1.52;display:none}
.tf-opts{display:flex;gap:.65rem}.tf-btn{flex:1;padding:.6rem;border-radius:7px;border:2px solid var(--b);background:var(--s2);color:var(--t);font-family:var(--fm);font-size:.8rem;font-weight:700;cursor:pointer;transition:all .18s;text-align:center}
.tf-btn:hover:not(:disabled){border-color:var(--c2);background:rgba(59,130,246,.09)}
.tf-btn.qc{border-color:var(--c6);background:rgba(74,222,128,.14);color:var(--c6)}.tf-btn.qw{border-color:var(--c5);background:rgba(248,113,113,.14);color:var(--c5)}.tf-btn:disabled{cursor:not-allowed}
.qsbtn{padding:.45rem 1.1rem;border-radius:6px;border:none;background:var(--c3);color:var(--bg);font-family:var(--fm);font-size:.68rem;font-weight:700;cursor:pointer;transition:all .15s;margin-bottom:.4rem}
.qsbtn:hover{filter:brightness(1.12)}.qsbtn:disabled{opacity:.5;cursor:not-allowed}
.qdone{background:linear-gradient(135deg,rgba(74,222,128,.1),rgba(59,130,246,.1));border:1px solid var(--c6);border-radius:12px;padding:1.8rem;text-align:center;margin-bottom:1.1rem;display:none}
.qdone h2{font-family:var(--fd);font-size:1.4rem;color:var(--c6);margin-bottom:.4rem}
.bscore{font-family:var(--fm);font-size:2.6rem;font-weight:700;color:var(--tb)}
.qcats{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.85rem}
.qcatb{padding:.25rem .68rem;border-radius:5px;border:1px solid var(--b);background:var(--s2);color:var(--td);font-family:var(--fm);font-size:.59rem;cursor:pointer;transition:all .15s}
.qcatb:hover{color:var(--t)}.qcatb.on{color:var(--c1);border-color:var(--c1);background:rgba(240,192,64,.08)}
/* GAME */
.gstatrow{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center;margin-bottom:1rem}
.gstat{background:var(--s1);border:1px solid var(--b);border-radius:9px;padding:.6rem 1.1rem;text-align:center;min-width:80px}
.gstat .gv{font-family:var(--fm);font-size:1.25rem;font-weight:700}.gstat .gl{font-size:.58rem;color:var(--td);text-transform:uppercase;letter-spacing:.05em}
.gcard{background:var(--s1);border:1px solid var(--b);border-radius:16px;padding:1.6rem;text-align:center;min-height:270px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;max-width:650px;margin:0 auto}
.gtimer{width:100%;height:5px;background:var(--s2);border-radius:10px;overflow:hidden;margin-bottom:.85rem;max-width:650px;margin-left:auto;margin-right:auto}
.gtimerb{height:100%;border-radius:10px;transition:width .1s linear}
.gq{font-size:.97rem;font-weight:600;margin-bottom:1.1rem;line-height:1.52;position:relative}
.gopts{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;width:100%}
.gopt{padding:.75rem;border-radius:8px;border:2px solid var(--b);background:var(--s2);color:var(--t);font-size:.8rem;cursor:pointer;transition:all .16s;font-family:var(--ff)}
.gopt:hover:not(:disabled){border-color:var(--c4);background:rgba(167,139,250,.09);transform:scale(1.02)}
.gopt.gc{border-color:var(--c6);background:rgba(74,222,128,.16);color:var(--c6);font-weight:700}
.gopt.gw{border-color:var(--c5);background:rgba(248,113,113,.16);color:var(--c5)}.gopt:disabled{cursor:not-allowed}
.gfb{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);font-family:var(--fd);font-size:1.7rem;font-weight:900;pointer-events:none;opacity:0;transition:all .28s;z-index:10}
.gfb.show{opacity:1;transform:translate(-50%,-78%)}.gfb.gc{color:var(--c6)}.gfb.gw{color:var(--c5)}
.gscreen{max-width:650px;margin:0 auto}
.gstart,.gover{background:var(--s1);border:1px solid var(--b);border-radius:16px;padding:2rem;text-align:center}
.gstart h2,.gover h2{font-family:var(--fd);font-size:1.45rem;margin-bottom:.4rem}
.gstart p,.gover p{color:var(--td);margin-bottom:1rem;font-size:.83rem}
.dbtns{display:flex;gap:.65rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem}
.dbtn{padding:.48rem 1.2rem;border-radius:6px;border:2px solid var(--b);background:var(--s2);color:var(--t);font-family:var(--fm);font-size:.7rem;cursor:pointer;transition:all .18s}
.dbtn.sel{border-color:var(--c1);color:var(--c1);background:rgba(240,192,64,.09)}
.gfinal{font-family:var(--fm);font-size:2.6rem;color:var(--c1);font-weight:700}
.btn{padding:.45rem 1.1rem;border-radius:6px;border:1px solid transparent;cursor:pointer;font-family:var(--fm);font-size:.66rem;font-weight:700;transition:all .15s;text-transform:uppercase;letter-spacing:.04em}
.btn-p{background:var(--c1);color:var(--bg)}.btn-p:hover{filter:brightness(1.1)}
.btn-s{background:transparent;color:var(--t);border-color:var(--b)}.btn-s:hover{background:var(--s2)}
.btn-d{background:var(--c5);color:#fff}.btn-row{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1rem}
#stop{position:fixed;bottom:1.2rem;right:1.2rem;background:var(--c1);color:var(--bg);border:none;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:.95rem;z-index:500;display:none;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(240,192,64,.4);transition:transform .15s}
#stop:hover{transform:scale(1.12)}
.sect-anchor{height:1px;margin-bottom:.3rem}
</style>
</head>
<body>
<header>
<div class="hdr">
  <div class="logo">Module 3 — STS<small>Science, Technology & Society | Deep Study Hub</small></div>
  <nav>
    <button class="nb on" onclick="gp('home')">🏠 Home</button>
    <button class="nb" onclick="gp('fcp')">📊 Flowcharts ★</button>
    <button class="nb" onclick="gp('l1')">💻 Info Age</button>
    <button class="nb" onclick="gp('l2')">🌿 Biodiversity</button>
    <button class="nb" onclick="gp('l3')">🧬 GMO</button>
    <button class="nb" onclick="gp('l4')">⚛️ Nano World</button>
    <button class="nb" onclick="gp('l5')">🧪 Gene Therapy</button>
    <button class="nb" onclick="gp('l6')">🌡️ Climate</button>
    <button class="nb" onclick="gp('flash')">🃏 Flashcards</button>
    <button class="nb" onclick="gp('quiz')">📝 Quiz (300)</button>
    <button class="nb" onclick="gp('game')">🎮 Battle</button>
  </nav>
</div>
